<!DOCTYPE html>
<html>
<head>
    <title>View Data</title>
</head>
<body>

<h2>Chatbot Responses</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Keyword</th>
        <th>Response</th>
        <th>Action</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>
           <a href="/edit/{{ row[0] }}">Edit</a>
|
            <a href="/delete/{{ row[0] }}">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
