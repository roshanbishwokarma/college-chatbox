<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>

    <style>
        /* ================= BODY BACKGROUND ================= */
        body {
            font-family: Arial;
            margin: 0;
            height: 100vh;

            background-image: url("https://images.unsplash.com/photo-1518770660439-4636190af475");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ================= CHAT CONTAINER ================= */
       .chat-container {
    width: 420px;
    max-width: 95vw;
    height: 600px;

    background: rgba(255, 255, 255, 0.25);

    border-radius: 15px;
    padding: 12px;

    display: flex;
    flex-direction: column;

    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
        /* ================= CHAT BOX ================= */
      .chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px;

    display: flex;
    flex-direction: column;
}
        /* ================= MESSAGES ================= */
       .message {
    display: inline-block;
    padding: 10px 14px;
    margin: 8px 0;
    border-radius: 12px;

    max-width: 70%;
    width: fit-content;

    word-wrap: break-word;
    white-space: pre-wrap;
}
.user {
    background: #0084ff;
    color: white;

    margin-left: auto;
    text-align: left;
}

.bot {
    background: #e5e5ea;
    color: black;

    margin-right: auto;
    text-align: left;
}
        /* ================= INPUT AREA ================= */
       .input-box {
    display: flex;
    margin-top: 10px;
    padding: 8px;

    background: rgba(255,255,255,0.2);
    border-radius: 12px;
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 15px;
}

button {
    padding: 14px 20px;
    margin-left: 10px;

    background: #4a90e2;
    color: white;

    border: none;
    border-radius: 10px;

    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

button:hover {
    background: #357ab8;
}
    </style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">
    <h2>R O S H ♥ N</h2>
</div>

    <!-- CHAT AREA -->
    <div id="chat-box" class="chat-box"></div>

    <!-- INPUT AREA -->
    <div class="input-box">
        <input type="text" id="user-input" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
function sendMessage() {
    let input = document.getElementById("user-input");
    let message = input.value;

    if (message === "") return;

    let chatBox = document.getElementById("chat-box");

    // USER MESSAGE
    chatBox.innerHTML += `<div class="message user">${message}</div>`;

    input.value = "";

    // 🔥 TYPING INDICATOR
    let typing = document.createElement("div");
    typing.className = "message bot";
    typing.id = "typing";
    typing.innerHTML = "ROSH is typing...";
    chatBox.appendChild(typing);

    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("/get", {
        method: "POST",
        body: new URLSearchParams({message: message}),
        headers: {"Content-Type": "application/x-www-form-urlencoded"}
    })
    .then(res => res.text())
    .then(data => {

        // REMOVE TYPING
        document.getElementById("typing").remove();

        // SHOW RESPONSE
        chatBox.innerHTML += `<div class="message bot">${data}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

/* ENTER KEY SUPPORT (ChatGPT style) */
document.getElementById("user-input").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
