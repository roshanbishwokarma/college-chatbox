<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=2071&auto=format&fit=crop') no-repeat center center/cover;
        }

        .overlay{
            position:absolute;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.6);
        }

        .login-box{
            position:relative;
            width:380px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(10px);
            padding:40px;
            border-radius:20px;
            box-shadow:0px 0px 25px rgba(0,0,0,0.4);
            color:white;
            z-index:1;
        }

        h2{
            text-align:center;
            margin-bottom:30px;
            font-size:32px;
        }

        .subtitle{
            text-align:center;
            margin-bottom:25px;
            color:#ddd;
            font-size:14px;
        }

        input{
            width:100%;
            padding:14px;
            margin-top:15px;
            border:none;
            border-radius:12px;
            outline:none;
            font-size:16px;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:20px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:12px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }


        p{
            text-align:center;
            margin-top:20px;
            color:white;
        }

        a{
            color:#93c5fd;
            text-decoration:none;
            font-weight:bold;
        }

    </style>
</head>
<body>

<div class="overlay"></div>

<div class="login-box">

    <h2>College Chatbot</h2>

    <div class="subtitle">
        Login to continue your smart conversation
    </div>

    <form method="POST">

        <input type="text" name="username" placeholder="Enter Username" required>

        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>

    </form>

    <p>
        Don't have an account?
        <a href="/register">Register</a>
    </p>

</div>

</body>
</html>
